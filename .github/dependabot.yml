version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "direct"
    groups:
      all-nuget:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps):"
    pull-request-branch-name:
      separator: "/"
